services:

  opal:
    build: .
    ports:
      # Bind to loopback only: the app must be reachable ONLY through the
      # Apache + Shibboleth SSO proxy. Exposing it publicly would let anyone
      # bypass Okta and spoof the X-Remote-* SSO headers. See docs/SSO.md.
      - "127.0.0.1:9090:8000"
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/opal.db
      BACKUP_DIR: /data/backups
      ROOT_PATH: /opal-central
      OPAL_FERNET_KEY: ${OPAL_FERNET_KEY:-}
      # Trust the proxy-forwarded Okta identity and auto-login/provision users.
      SSO_ENABLED: ${SSO_ENABLED:-true}
    restart: unless-stopped

  ingest:
    build: .
    volumes:
      - ./data:/data
      - ./csv:/csv:ro
    environment:
      DB_PATH: /data/opal.db
    entrypoint: ["python3", "ingest.py"]
    command: ["/csv/engagement.csv"]
    profiles:
      - ingest
