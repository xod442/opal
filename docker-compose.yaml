services:

  opal:
    build: .
    ports:
      - "8443:8000"
    volumes:
      - ./data:/data
    environment:
      DB_PATH: /data/opal.db
      BACKUP_DIR: /data/backups
    restart: unless-stopped

  ingest:
    build: .
    volumes:
      - ./data:/data
      - ./csv:/csv:ro
    environment:
      DB_PATH: /data/opal.db
    entrypoint: ["python3", "ingest.py"]
    command: ["/csv/engagement.csv"]
    profiles:
      - ingest
